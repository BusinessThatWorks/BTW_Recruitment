<div class="interview-dashboard-container">

	<!-- Date Filters -->
	<div class="card p-3 mb-3">
		<div class="row g-3 align-items-end">
			<div class="col-md-3">
				<label class="form-label">From Date</label>
				<input type="date" class="form-control" id="interview-from-date" />
			</div>
			<div class="col-md-3">
				<label class="form-label">To Date</label>
				<input type="date" class="form-control" id="interview-to-date" />
			</div>
			<div class="col-md-2">
				<button class="btn btn-outline-secondary w-100" id="interview-clear-dates">
					<i class="fa fa-times"></i> Clear Dates
				</button>
			</div>
			<div class="col-md-2 ms-auto">
				<button class="btn btn-success w-100" id="download-excel-btn">
					<i class="fa fa-download"></i> Download Excel
				</button>
			</div>
		</div>
	</div>

	<!-- Tabs -->
	<div class="card">
		<div class="card-header">
			<ul class="nav nav-tabs card-header-tabs" id="interviewTabs" role="tablist">
				<li class="nav-item" role="presentation">
					<button class="nav-link active"
						id="summary-tab"
						data-bs-toggle="tab"
						data-bs-target="#summary-pane"
						type="button"
						role="tab">
						Interview Summary
					</button>
				</li>
				<li class="nav-item" role="presentation">
					<button class="nav-link"
						id="details-tab"
						data-bs-toggle="tab"
						data-bs-target="#details-pane"
						type="button"
						role="tab">
						Interview Details
					</button>
				</li>
			</ul>
		</div>

		<div class="card-body">
			<div class="tab-content" id="interviewTabsContent">

				<!-- Tab 1: Summary -->
				<div class="tab-pane fade show active" id="summary-pane" role="tabpanel">
					<div class="d-flex gap-2 align-items-center mb-2">
						<input type="text" class="form-control" id="summary-search" 
							placeholder="Search Job Opening..." autocomplete="off" />
						<button class="btn btn-outline-secondary" id="summary-search-clear">Clear</button>
					</div>
					<div id="interview-dashboard-table"></div>
				</div>

				<!-- Tab 2: Details (Frappe DataTable) -->
				<div class="tab-pane fade" id="details-pane" role="tabpanel">
	<div id="interview-details-table"></div>
</div>

			</div>
		</div>
	</div>
</div>
